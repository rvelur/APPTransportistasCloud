name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Obtener el código fuente de tu repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ========================================================
      # Configurar Java en el agente de GitHub
      # ========================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ========================================================
      # Compilar el proyecto y generar el .jar real
      # ========================================================
      - name: Build with Maven (Genera el .jar limpio)
        run: mvn clean package -DskipTests

      # Paso 2: Conectarse a tu DockerHub
      # ========================================================
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen localmente usando tu Dockerfile
      # ========================================================
      - name: Build Docker Image
        run: |
          docker build --no-cache -t robvelasquez/transportistas-api:latest .

      # Paso 4: Subir la imagen empaquetada a DockerHub
      # ========================================================
      - name: Push Docker Image
        run: |
          docker push robvelasquez/transportistas-api:latest

      # Paso 5 y 6: Despliegue automático vía SSH directo en la EC2
      # ========================================================
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: 'ec2-user'
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Detener y limpiar versiones anteriores del contenedor de la API si existieran
            sudo docker stop transportistas-api || true
            sudo docker rm -f transportistas-api || true
            
            # 2. Bajar tu imagen limpia recién generada desde DockerHub
            sudo docker pull robvelasquez/transportistas-api:latest
            
            # 3. Encender tu contenedor inyectando los tokens evaluados de forma segura con el volumen corregido
            sudo docker run -d \
              --name transportistas-api \
              --network="host" \
              -v /mnt/efs:/mnt/efs \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_REGION=us-east-1 \
              robvelasquez/transportistas-api:latest
