name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Obtener el código fuente de tu repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ========================================================
      # Configurar Java 21 
      # ========================================================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ========================================================
      # Compilar el proyecto y generar el .jar real
      # ========================================================
      - name: Build with Maven (Genera el .jar limpio)
        run: mvn clean package -DskipTests

      # Paso 2: Conectarse a tu DockerHub
      # ========================================================
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen localmente usando tu Dockerfile
      # ========================================================
      - name: Build Docker Image
        run: |
          docker build --no-cache -t robvelasquez/transportistas-api:latest .

      # Paso 4: Subir la imagen empaquetada a DockerHub
      # ========================================================
      - name: Push Docker Image
        run: |
          docker push robvelasquez/transportistas-api:latest

      # Paso 5 y 6: Despliegue automático vía SSH directo en la EC2 usando Docker Compose
      # ========================================================
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: 'ec2-user'
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Crear el directorio para que el proyecto exista en la EC2
            mkdir -p ~/transportistas
            cd ~/transportistas

            # 2. Asegurar que Docker Compose esté instalado en la EC2
            if ! command -v docker-compose &> /dev/null && ! sudo docker compose version &> /dev/null; then
              echo "Docker Compose no encontrado. Instalando..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
            fi

            # 3. Descargar la última definición de tu docker-compose.yml desde GitHub
            curl -o docker-compose.yml https://raw.githubusercontent.com/rvelur/APPTransportistasCloud/main/docker-compose.yml

            # 4. Descargar la última imagen del backend de DockerHub
            sudo docker pull robvelasquez/transportistas-api:latest

            # 5. Levantar la infraestructura completa inyectando las credenciales temporales de AWS
            export DOCKER_IMAGE=robvelasquez/transportistas-api:latest
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}

            # Ejecutar con el comando instalado
            sudo -E docker-compose down
            sudo -E docker-compose up -d