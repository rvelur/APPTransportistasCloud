name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Obtener el código fuente de tu repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ========================================================
      # Configurar Java en el agente de GitHub
      # ========================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ========================================================
      # Compilar el proyecto y generar el .jar real
      # ========================================================
      - name: Build with Maven (Genera el .jar limpio)
        run: mvn clean package -DskipTests

      # Paso 2: Conectarse a tu DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen localmente usando tu Dockerfile
      - name: Build Docker Image
        run: |
          docker build --no-cache -t robvelasquez/transportistas-api:latest .

      # Paso 4: Subir la imagen empaquetada a DockerHub
      - name: Push Docker Image
        run: |
          docker push robvelasquez/transportistas-api:latest

      # Paso 5: Registrar tu llave .pem en el agente de GitHub para abrir la conexión SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 6: Entrar por SSH a tu instancia EC2 de AWS y desplegar la aplicación conectada a Oracle
      - name: SSH commands to deploy
        env:
          KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ec2-user@${{ secrets.EC2_HOST }} _KEY_ID="$KEY_ID" _SECRET="$SECRET_KEY" _TOKEN="$SESSION_TOKEN" 'bash -s' << 'EOF'
          
          # 1. Autenticarse en DockerHub dentro de la máquina de AWS
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u robvelasquez --password-stdin
          
          # 2. Bajar tu imagen limpia recién generada
          docker pull robvelasquez/transportistas-api:latest
          
          # 3. Detener y limpiar versiones anteriores del contenedor de la API si existieran
          docker stop transportistas-api || true
          docker rm transportistas-api || true
          
          # 4. Encender tu contenedor inyectando los tokens de seguridad corregidos
          docker run -d \
            --name transportistas-api \
            --network="host" \
            -v /mnt/efs:/mnt/efs/temporal \
            -e AWS_ACCESS_KEY_ID="$_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY="$_SECRET" \
            -e AWS_SESSION_TOKEN="$_TOKEN" \
            -e AWS_REGION=us-east-1 \
            robvelasquez/transportistas-api:latest
            
          EOF